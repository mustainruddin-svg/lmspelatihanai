<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rekap Progres — AI untuk Guru</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="admin-app"></div>

  <script src="config.js"></script>
  <script src="modules-data.js"></script>
  <script>
  const UNIT_LABEL = { paud:"PAUD", sdit:"SDIT", smpit:"SMPIT", smait:"SMAIT" };
  const UNITS = Object.keys(UNIT_LABEL);
  const root = document.getElementById("admin-app");

  /* ---------------------------------------------------------
     Helper kecil (sama pola dengan app.js)
     --------------------------------------------------------- */
  function el(tag, attrs = {}, children = []){
    const node = document.createElement(tag);
    Object.entries(attrs).forEach(([k,v]) => {
      if(k === "class") node.className = v;
      else if(k.startsWith("on") && typeof v === "function") node.addEventListener(k.slice(2), v);
      else node.setAttribute(k, v);
    });
    (Array.isArray(children) ? children : [children]).forEach(c => {
      if(c === null || c === undefined) return;
      node.appendChild(typeof c === "string" ? document.createTextNode(c) : c);
    });
    return node;
  }

  function toastMsg(msg){
    let t = document.getElementById("admin-toast");
    if(!t){ t = el("div", { id:"admin-toast", class:"toast" }); document.body.appendChild(t); }
    t.textContent = msg;
    t.classList.add("toast--show");
    clearTimeout(t._timer);
    t._timer = setTimeout(() => t.classList.remove("toast--show"), 2600);
  }

  // Normalisasi nomor Indonesia jadi format wa.me (62xxxxxxxxxx)
  function normalizeWa(num){
    let n = (num || "").toString().replace(/[^\d+]/g, "");
    if(!n) return "";
    if(n.startsWith("+62")) n = n.slice(1);
    else if(n.startsWith("0")) n = "62" + n.slice(1);
    else if(!n.startsWith("62")) n = "62" + n;
    return n;
  }

  function waLink(num, msg){
    const n = normalizeWa(num);
    if(!n) return null;
    return `https://wa.me/${n}?text=${encodeURIComponent(msg)}`;
  }

  /* ---------------------------------------------------------
     STATE
     --------------------------------------------------------- */
  let ALL_ROWS = [];     // raw baris dari Progress sheet
  let GURU_LIST = [];    // agregasi per guru
  const FILTERS = { search: "", unit: "semua", tab: "semua" };

  function aggregate(rows){
    const byKey = {};
    rows.forEach(r => {
      const key = `${(r.nama||"").trim().toLowerCase()}__${(r.unit||"").trim().toLowerCase()}`;
      if(!byKey[key]){
        byKey[key] = { nama:r.nama, unit:r.unit, whatsapp:r.whatsapp || "", modules:{}, lastUpdate:r.timestamp };
      }
      byKey[key].modules[r.moduleId] = r;
      if(r.whatsapp) byKey[key].whatsapp = r.whatsapp;
      if(new Date(r.timestamp) > new Date(byKey[key].lastUpdate)) byKey[key].lastUpdate = r.timestamp;
    });
    return Object.values(byKey).map(g => {
      const completedCount = Object.values(g.modules).filter(m => m.completed).length;
      return { ...g, completedCount, totalModules: MODULES.length };
    });
  }

  function unitStats(unit){
    const list = unit === "semua" ? GURU_LIST : GURU_LIST.filter(g => (g.unit||"").toLowerCase() === unit);
    if(list.length === 0) return { count:0, avgPct:0 };
    const avgPct = Math.round(list.reduce((s,g) => s + (g.completedCount/g.totalModules)*100, 0) / list.length);
    return { count:list.length, avgPct };
  }

  function filteredGuru(){
    return GURU_LIST.filter(g => {
      if(FILTERS.unit !== "semua" && (g.unit||"").toLowerCase() !== FILTERS.unit) return false;
      if(FILTERS.search && !g.nama.toLowerCase().includes(FILTERS.search.toLowerCase())) return false;
      if(FILTERS.tab === "belum" && g.completedCount >= g.totalModules) return false;
      return true;
    }).sort((a,b) => b.completedCount - a.completedCount);
  }

  /* ---------------------------------------------------------
     GATE (PIN)
     --------------------------------------------------------- */
  function renderGate(){
    root.innerHTML = "";
    const box = el("div", { class:"onboard" }, el("div", { class:"onboard__card pin-gate" }, [
      el("span", { class:"onboard__eyebrow" }, "Khusus Tim Media & Humas"),
      el("h1", { class:"onboard__title h-display" }, "Rekap Progres Guru"),
      el("p", { class:"onboard__desc" }, "Masukkan PIN untuk membuka rekap penyelesaian modul seluruh unit."),
      el("div", { class:"field" }, [
        el("label", { for:"pin" }, "PIN"),
        el("input", { type:"text", id:"pin", placeholder:"••••" })
      ]),
      el("button", { class:"btn btn--primary btn--block", onclick: () => {
        const val = document.getElementById("pin").value.trim();
        if(val === CONFIG.ADMIN_PIN){ loadAndRender(); }
        else { toastMsg("PIN salah, coba lagi."); }
      }}, "Buka Rekap")
    ]));
    root.appendChild(box);
  }

  /* ---------------------------------------------------------
     SHELL
     --------------------------------------------------------- */
  function shell(contentNode){
    const wrap = el("div", {});
    wrap.appendChild(el("div", { class:"topbar" }, [
      el("div", { class:"topbar__brand" }, [
        el("div", { class:"topbar__mark" }, "AR"),
        el("div", {}, [
          el("div", { class:"topbar__title h-display" }, "Rekap Progres Guru"),
          el("div", { class:"topbar__sub" }, "Yayasan Ar-Rahmah Sulawesi — Media & Humas")
        ])
      ]),
      el("a", { class:"link-quiet", href:"index.html" }, "← Ke halaman guru")
    ]));
    wrap.appendChild(el("main", {}, el("div", { class:"container" }, contentNode)));
    return wrap;
  }

  /* ---------------------------------------------------------
     LOAD DATA
     --------------------------------------------------------- */
  async function loadAndRender(){
    root.innerHTML = "";
    root.appendChild(shell(el("p", { style:"color:var(--slate); font-size:13.5px;" }, "Memuat data dari Google Sheet...")));

    if(!CONFIG.API_URL){
      root.innerHTML = "";
      root.appendChild(shell([
        el("h1", { class:"h-display", style:"font-size:22px;" }, "Ringkasan Penyelesaian Modul"),
        el("div", { class:"card", style:"margin-top:16px;" }, [
          el("p", {}, "Backend Google Apps Script belum dihubungkan. Rekap lintas-guru memerlukan CONFIG.API_URL diisi di config.js (lihat backend/README.md)."),
          el("p", {}, "Selama itu, setiap guru tetap bisa belajar secara mandiri — progres tersimpan di perangkat masing-masing.")
        ])
      ]));
      return;
    }

    try{
      const res = await fetch(`${CONFIG.API_URL}?action=getAllProgress`);
      const data = await res.json();
      ALL_ROWS = data.rows || [];
      GURU_LIST = aggregate(ALL_ROWS);
      renderDashboard();
    }catch(e){
      root.innerHTML = "";
      root.appendChild(shell(el("div", { class:"admin-empty" },
        "Gagal memuat data. Pastikan URL Web App Google Apps Script sudah benar dan sudah di-deploy dengan akses \"Siapa saja\".")));
    }
  }

  /* ---------------------------------------------------------
     DASHBOARD (KPI + filter + tabel)
     --------------------------------------------------------- */
  function renderDashboard(){
    root.innerHTML = "";
    const container = el("div", {});

    container.appendChild(el("h1", { class:"h-display", style:"font-size:22px; margin-bottom:16px;" }, "Ringkasan Penyelesaian Modul"));

    // ---- KPI cards ----
    const kpiGrid = el("div", { class:"kpi-grid" });
    const total = unitStats("semua");
    kpiGrid.appendChild(el("div", { class:"kpi-card kpi-card--total" }, [
      el("div", { class:"kpi-card__label" }, "SEMUA UNIT"),
      el("div", { class:"kpi-card__value" }, `${total.avgPct}%`),
      el("div", { class:"kpi-card__sub" }, `${total.count} guru terdaftar`)
    ]));
    UNITS.forEach(u => {
      const s = unitStats(u);
      kpiGrid.appendChild(el("div", { class:"kpi-card" }, [
        el("div", { class:"kpi-card__label" }, UNIT_LABEL[u]),
        el("div", { class:"kpi-card__value" }, `${s.avgPct}%`),
        el("div", { class:"kpi-card__sub" }, `${s.count} guru · rata-rata progres`)
      ]));
    });
    container.appendChild(kpiGrid);

    // ---- View tabs ----
    const tabs = el("div", { class:"view-tabs" });
    [["semua","Semua Guru"], ["belum","Belum Selesai"]].forEach(([key,label]) => {
      const t = el("button", {
        class:"view-tab", "aria-selected": FILTERS.tab === key ? "true" : "false",
        onclick: () => { FILTERS.tab = key; renderDashboard(); }
      }, label);
      tabs.appendChild(t);
    });
    container.appendChild(tabs);

    // ---- Controls: search + unit chips ----
    const controls = el("div", { class:"admin-controls" });
    const search = el("input", { class:"search-input", type:"text", placeholder:"Cari nama guru...", value:FILTERS.search });
    search.addEventListener("input", () => { FILTERS.search = search.value; renderList(); });
    controls.appendChild(search);
    const chipRow = el("div", { class:"chip-row" });
    [["semua","Semua Unit"], ...UNITS.map(u => [u, UNIT_LABEL[u]])].forEach(([key,label]) => {
      const chip = el("button", {
        class:"chip", "aria-pressed": FILTERS.unit === key ? "true" : "false",
        onclick: () => { FILTERS.unit = key; renderDashboard(); }
      }, label);
      chipRow.appendChild(chip);
    });
    controls.appendChild(chipRow);
    container.appendChild(controls);

    // ---- Tab: Belum Selesai -> tambahan kotak broadcast WA ----
    const listHost = el("div", { id:"admin-list-host" });
    container.appendChild(listHost);

    root.appendChild(shell(container));
    renderList(); // isi listHost sesuai filter saat ini
  }

  function renderList(){
    const host = document.getElementById("admin-list-host");
    if(!host) return;
    host.innerHTML = "";
    const list = filteredGuru();

    if(FILTERS.tab === "belum"){
      host.appendChild(renderWaBroadcastBox(list));
    }

    if(list.length === 0){
      host.appendChild(el("div", { class:"admin-empty" }, "Tidak ada guru yang cocok dengan filter ini."));
      return;
    }

    const table = el("table", { class:"admin-table" });
    const thead = el("thead", {}, el("tr", {}, [
      el("th", {}, "Nama Guru"), el("th", {}, "Unit"), el("th", {}, "Modul Selesai"),
      el("th", {}, "Progres"), el("th", {}, "Update Terakhir"), el("th", {}, "")
    ]));
    const tbody = el("tbody", {});
    list.forEach(g => {
      const pct = Math.round((g.completedCount / g.totalModules) * 100);
      const cells = [
        el("td", {}, g.nama),
        el("td", {}, UNIT_LABEL[(g.unit||"").toLowerCase()] || g.unit),
        el("td", {}, `${g.completedCount} / ${g.totalModules}`),
        el("td", {}, el("div", { class:"progress-track", style:"width:120px;" }, el("div", { class:"progress-fill", style:`width:${pct}%` }))),
        el("td", {}, g.lastUpdate ? new Date(g.lastUpdate).toLocaleString("id-ID") : "-")
      ];
      const actionCell = el("td", {});
      const actions = el("div", { style:"display:flex; gap:6px;" });
      actions.appendChild(el("button", { class:"row-detail-btn", onclick: () => openDetail(g) }, "Detail"));
      if(FILTERS.tab === "belum"){
        const link = waLink(g.whatsapp, waMessageFor(g));
        if(link){
          actions.appendChild(el("a", { class:"wa-btn", href:link, target:"_blank", rel:"noopener" }, "💬 WA"));
        }
      }
      actionCell.appendChild(actions);
      cells.push(actionCell);
      tbody.appendChild(el("tr", {}, cells));
    });
    table.appendChild(thead);
    table.appendChild(tbody);
    host.appendChild(table);
  }

  function waMessageFor(g){
    const sisa = g.totalModules - g.completedCount;
    return `Assalamu'alaikum ${g.nama}, ini pengingat dari Media & Humas Ar-Rahmah 🙏. Progres pelatihan "AI untuk Guru" Anda saat ini ${g.completedCount}/${g.totalModules} modul. Masih ada ${sisa} modul lagi — yuk diselesaikan di sela waktu luang. Jazakallahu khairan!`;
  }

  function renderWaBroadcastBox(list){
    const withPhone = list.filter(g => normalizeWa(g.whatsapp));
    const box = el("div", { class:"wa-broadcast-box" }, [
      el("p", { style:"margin:0 0 4px; font-size:13.5px; font-weight:700;" }, `${list.length} guru belum menyelesaikan seluruh modul`),
      el("p", { style:"margin:0; font-size:12.5px; color:var(--slate);" }, `${withPhone.length} di antaranya sudah mengisi No. WhatsApp saat onboarding.`)
    ]);
    const actions = el("div", { class:"wa-broadcast-box__actions" });
    actions.appendChild(el("button", { class:"btn btn--ghost", onclick: () => copyBroadcastList(list) }, "📋 Salin Daftar untuk WA"));
    box.appendChild(actions);
    return box;
  }

  function copyBroadcastList(list){
    const lines = list.map((g,i) => `${i+1}. ${g.nama} (${UNIT_LABEL[(g.unit||"").toLowerCase()] || g.unit}) — ${g.completedCount}/${g.totalModules} modul selesai`);
    const text = `Daftar guru yang belum menyelesaikan pelatihan "AI untuk Guru":\n\n${lines.join("\n")}`;
    if(navigator.clipboard && navigator.clipboard.writeText){
      navigator.clipboard.writeText(text).then(() => toastMsg("Daftar disalin ke clipboard.")).catch(() => toastMsg("Gagal menyalin — coba lagi."));
    } else {
      toastMsg("Clipboard tidak didukung di browser ini.");
    }
  }

  /* ---------------------------------------------------------
     DETAIL PER GURU (modal)
     --------------------------------------------------------- */
  function openDetail(g){
    const overlay = el("div", { class:"modal-overlay", onclick: (e) => { if(e.target === overlay) overlay.remove(); } });
    const card = el("div", { class:"modal-card" });
    card.appendChild(el("div", { class:"modal-card__head" }, [
      el("div", {}, [
        el("h2", { class:"modal-card__title h-display" }, g.nama),
        el("p", { class:"modal-card__sub" }, `${UNIT_LABEL[(g.unit||"").toLowerCase()] || g.unit} · ${g.completedCount}/${g.totalModules} modul selesai${g.whatsapp ? " · " + g.whatsapp : ""}`)
      ]),
      el("button", { class:"modal-close", onclick: () => overlay.remove() }, "✕")
    ]));

    MODULES.forEach(m => {
      const r = g.modules[m.id];
      const row = el("div", { class:"detail-mod-row" });
      row.appendChild(el("div", { class:"detail-mod-row__top" }, [
        el("span", { class:"detail-mod-row__title" }, `${String(m.id).padStart(2,"0")}. ${m.title}`),
        el("span", { class:"detail-mod-row__score" }, r ? (r.completed ? `✅ ${r.score}%` : `${r.score || 0}%`) : "Belum mulai")
      ]));
      if(r){
        const checkedCount = (r.selfCheck || []).filter(Boolean).length;
        row.appendChild(el("div", { class:"detail-mod-row__meta" },
          `Self-check: ${checkedCount}/${m.selfCheck.length} · Update: ${r.timestamp ? new Date(r.timestamp).toLocaleString("id-ID") : "-"}`));
        if(r.practice){
          row.appendChild(el("div", { class:"detail-mod-row__practice" }, r.practice));
        }
      }
      card.appendChild(row);
    });

    overlay.appendChild(card);
    document.body.appendChild(overlay);
  }

  renderGate();
  </script>
</body>
</html>
